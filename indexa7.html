<title>A7 RUN · Hamburg</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

  .hud .val{font-size:24px;font-weight:800;color:#fff;line-height:1;margin-top:3px;text-shadow:0 1px 5px rgba(0,0,0,.9);}
  .hud .right{text-align:right;}
  .place{position:absolute;top:56px;left:50%;transform:translateX(-50%);pointer-events:none;display:none;align-items:center;gap:8px;background:#0050a0;border:2px solid #fff;border-radius:6px;padding:6px 14px 6px 10px;box-shadow:0 4px 14px rgba(0,0,0,.5);}

  .place .shield{background:#0050a0;border:1.5px solid #fff;border-radius:4px;font-size:13px;font-weight:800;color:#fff;padding:1px 6px;}
  .place .name{color:#fff;font-size:15px;font-weight:700;white-space:nowrap;}
  .speedo{position:absolute;right:calc(14px + env(safe-area-inset-right));bottom:calc(14px + env(safe-area-inset-bottom));z-index:55;display:none;flex-direction:column;align-items:center;justify-content:center;width:88px;height:88px;border-radius:50%;border:2px solid rgba(255,255,255,.25);background:rgba(10,14,8,.6);backdrop-filter:blur(5px);box-shadow:0 4px 16px rgba(0,0,0,.4),inset 0 0 18px rgba(0,0,0,.4);pointer-events:none;}
  .speedo.on{display:flex;}
  .speedo .num{font-size:30px;font-weight:800;color:#fff;line-height:1;font-variant-numeric:tabular-nums;text-shadow:0 0 12px rgba(120,220,255,.4);}
  .speedo .unit{font-size:10px;letter-spacing:.18em;color:#9fb3c7;text-transform:uppercase;margin-top:3px;}
  #brakeBtn{position:absolute;bottom:calc(24px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);z-index:55;display:none;flex-direction:column;align-items:center;justify-content:center;width:190px;height:78px;border-radius:18px;border:2px solid rgba(255,70,50,0.45);background:linear-gradient(to top,rgba(190,12,2,0.88) calc(var(--bd,0) * 100%),rgba(22,6,4,0.72) calc(var(--bd,0) * 100%));backdrop-filter:blur(5px);color:rgba(255,100,80,0.9);font-size:16px;font-weight:900;letter-spacing:.16em;text-transform:uppercase;pointer-events:auto;touch-action:none;user-select:none;-webkit-user-select:none;transition:border-color .1s,color .1s;}
  #brakeBtn.on{display:flex;}
  #brakeBtn.active{border-color:rgba(255,110,90,0.95);color:#fff;}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;pointer-events:none;}

  .logo .word{font-size:46px;font-weight:900;color:#fff;letter-spacing:.06em;text-shadow:0 3px 14px rgba(0,0,0,.7);}

  .seg{display:flex;gap:8px;width:100%;}
  .seg button{flex:1;cursor:pointer;border:1.5px solid rgba(255,255,255,.35);background:rgba(10,14,8,.5);color:#dfe6d8;padding:11px 0;border-radius:12px;font-size:13px;font-weight:700;letter-spacing:.05em;backdrop-filter:blur(4px);transition:all .14s ease;}

  .ghost2{background:rgba(255,255,255,.12)!important;color:#fff!important;border:1.5px solid rgba(255,255,255,.4)!important;box-shadow:none!important;font-size:14px!important;padding:14px 0!important;backdrop-filter:blur(4px);}

  .cbtn.on{background:rgba(255,210,63,.2);color:#ffd23f;cursor:default;}
  #over{justify-content:center;gap:18px;padding:26px;}
  #over .inner{position:relative;display:flex;flex-direction:column;align-items:center;gap:18px;text-align:center;pointer-events:auto;}
  .crash{font-size:38px;font-weight:900;color:#fff;letter-spacing:.05em;text-shadow:0 3px 14px rgba(0,0,0,.7);}
  .scorecard{display:flex;gap:36px;}
  .scorecard div{display:flex;flex-direction:column;gap:4px;}

  .scorecard .n{font-size:30px;font-weight:800;color:#fff;}
  .scorecard .n.best{color:#ffd23f;}
  .verdict{font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:#dfe6d8;}
  .btnrow{display:flex;gap:12px;width:100%;max-width:340px;}
  .btn{flex:1;cursor:pointer;border:none;padding:15px 0;border-radius:100px;font-size:14px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;transition:transform .12s ease;}
  .btn:active{transform:scale(.96);}
  .btn.primary{color:#1a1200;background:linear-gradient(95deg,#ffd23f,#ffe680);box-shadow:0 6px 20px rgba(255,210,63,.4);}
  .btn.ghost{color:#fff;background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.4);backdrop-filter:blur(4px);}
  #pauseBtn{position:absolute;top:calc(10px + env(safe-area-inset-top));right:calc(14px + env(safe-area-inset-right));z-index:60;width:36px;height:36px;border-radius:50%;border:1.5px solid rgba(255,255,255,.28);background:rgba(10,14,8,.52);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;cursor:pointer;pointer-events:auto;}
  #pauseBtn.on{display:flex;}
  #pauseBtn:active{transform:scale(.93);}
  #pause{justify-content:center;gap:18px;padding:26px;}
  .pmenu{position:relative;display:flex;flex-direction:column;align-items:center;gap:18px;text-align:center;pointer-events:auto;width:100%;max-width:360px;}
  .ptitle{font-size:32px;font-weight:900;color:#fff;letter-spacing:.06em;text-shadow:0 3px 14px rgba(0,0,0,.7);}
  .prow{width:100%;display:flex;flex-direction:column;gap:8px;align-items:center;}
  .plabel{font-size:10px;letter-spacing:.26em;text-transform:uppercase;color:#c7d0bd;text-shadow:0 1px 3px rgba(0,0,0,.8);}
  .ghost-tag{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:#7bdcff;background:rgba(120,220,255,.1);border:1px solid rgba(120,220,255,.3);border-radius:20px;padding:3px 10px;display:none;}
  .ghost-tag.on{display:inline-block;}
  .ghost-hud{position:absolute;top:calc(44px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);font-size:9px;letter-spacing:.26em;text-transform:uppercase;color:#7bdcff;background:rgba(0,0,0,.45);border:1px solid rgba(120,220,255,.35);border-radius:20px;padding:3px 10px;pointer-events:none;display:none;}
  .ghost-hud.on{display:block;}
  .seg button[data-d="ghost"].sel{background:rgba(120,220,255,.2);color:#7bdcff;border-color:rgba(120,220,255,.7);box-shadow:0 4px 14px rgba(120,220,255,.2);}
</style>

<body>
<div id="wrap">
  <canvas id="game"></canvas>
  <div class="hud" id="hud">
    <div><div class="label">Strecke</div><div class="val" id="score">0,0 km</div></div>
    <div class="right"><div class="label">Best</div><div class="val" id="best">0,0 km</div></div>
  </div>
  <div class="place" id="place"><span class="shield">A7</span><span class="name" id="placeName">Schnelsen</span></div>
  <div class="speedo" id="speedoBox"><span class="num" id="speedo">0</span><span class="unit">km/h</span></div>
  <button id="brakeBtn" aria-label="Bremsen">BREMSE</button>

  <div class="screen" id="menu">
    <div class="veil"></div>
    <div class="top">
      <div class="logo"><span class="badge">A7</span><span class="word">RUN</span></div>
      <div class="tag">Hamburg → Grenztunnel Füssen</div>
      <div class="stats">
        <div><span class="l">Rekord</span><span class="v" id="rec">—</span></div>
        <div><span class="l">Coins</span><span class="v gold" id="coins">0</span></div>
      </div>
    </div>
    <div class="bottom">
      <div class="difflabel">Schwierigkeit</div>
      <div class="seg" id="seg">
        <button data-d="chill">Chill</button>
        <button data-d="normal" class="sel">Normal</button>
        <button data-d="brutal">Brutal</button>
        <button data-d="ghost">Ghost</button>
      </div>
      <button class="play" id="play">Losfahren</button>
      <button class="play ghost2" id="shopBtn">Shop · Autos</button>
      <div class="hint">Tippen links / rechts · Desktop ← →</div>
    </div>
  </div>

  <div class="screen hidden" id="over">
    <div class="veil"></div>
    <div class="inner">
      <div class="crash">CRASH</div>
      <div class="scorecard">
        <div><span class="l">Strecke</span><span class="n" id="finalScore">0,0 km</span></div>
        <div><span class="l">Rekord</span><span class="n best" id="finalBest">0,0 km</span></div>
      </div>
      <div class="verdict" id="verdict">Geht besser.</div>
      <div class="earned" id="earned">+0 Coins</div>
      <div class="btnrow">
        <button class="btn ghost" id="toMenu">Menü</button>
        <button class="btn primary" id="retry">Nochmal</button>
      </div>
    </div>
  </div>
  <div class="screen hidden" id="shop">
    <div class="veil"></div>
    <div class="shopwrap">
      <div class="shophead">
        <span class="stitle">Shop</span>
        <span class="balance">Coins <b id="shopCoins">0</b></span>
      </div>
      <div class="grid" id="shopGrid"></div>
      <button class="btn ghost" id="shopBack">Zurück</button>
    </div>
  </div>
  <button id="mute" aria-label="Ton"></button>
  <button id="pauseBtn" aria-label="Pause"><svg width="14" height="14" viewBox="0 0 14 14" fill="#fff"><rect x="2" y="1" width="4" height="12" rx="1.5"/><rect x="8" y="1" width="4" height="12" rx="1.5"/></svg></button>
  <div class="ghost-hud" id="ghostHud">GHOST MODE</div>

  <div class="screen hidden" id="pause">
    <div class="veil"></div>
    <div class="pmenu">
      <div class="ptitle">Pause</div>
      <div class="prow">
        <div class="plabel">Schwierigkeit</div>
        <div class="seg" id="pseg">
          <button data-d="chill">Chill</button>
          <button data-d="normal">Normal</button>
          <button data-d="brutal">Brutal</button>
          <button data-d="ghost">Ghost</button>
        </div>
        <div class="ghost-tag" id="ghostTag">Kein Crash-Modus</div>
      </div>
      <div class="prow">
        <div class="plabel">Sound</div>
        <button class="btn ghost" id="pmuteBtn" style="width:100%">Ton aus</button>
      </div>
      <div class="btnrow">
        <button class="btn ghost" id="ptoMenu">Menü</button>
        <button class="btn primary" id="resumeBtn">Weiterfahren</button>
      </div>
    </div>
  </div>
</div>

<script>
const cv=document.getElementById('game'), ctx=cv.getContext('2d');

/* ============ Audio (Web Audio, synthetisiert) ============ */
const AU=(()=>{
  let ac,master,delay,fb,wet,noiseBuf,engine=null,muted=false;
  function ensure(){
    if(ac)return;
    ac=new (window.AudioContext||window.webkitAudioContext)();
    master=ac.createGain();master.gain.value=0.9;master.connect(ac.destination);
    delay=ac.createDelay();delay.delayTime.value=0.19;
    fb=ac.createGain();fb.gain.value=0.34;
    wet=ac.createGain();wet.gain.value=0;
    delay.connect(fb);fb.connect(delay);delay.connect(wet);wet.connect(master);
    noiseBuf=ac.createBuffer(1,ac.sampleRate,ac.sampleRate);
    const d=noiseBuf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
  }
  function noise(dur,type,f0,f1,g,toWet){ensure();
    const s=ac.createBufferSource();s.buffer=noiseBuf;
    const flt=ac.createBiquadFilter();flt.type=type;flt.frequency.setValueAtTime(f0,ac.currentTime);
    if(f1)flt.frequency.exponentialRampToValueAtTime(Math.max(40,f1),ac.currentTime+dur);
    const gn=ac.createGain();gn.gain.setValueAtTime(g,ac.currentTime);gn.gain.exponentialRampToValueAtTime(0.0001,ac.currentTime+dur);
    s.connect(flt);flt.connect(gn);gn.connect(master);if(toWet)gn.connect(delay);
    s.start();s.stop(ac.currentTime+dur);
  }
  function tone(f0,f1,dur,type,g,toWet){ensure();
    const o=ac.createOscillator();o.type=type;o.frequency.setValueAtTime(f0,ac.currentTime);
    if(f1)o.frequency.exponentialRampToValueAtTime(Math.max(20,f1),ac.currentTime+dur);
    const gn=ac.createGain();gn.gain.setValueAtTime(0.0001,ac.currentTime);gn.gain.exponentialRampToValueAtTime(g,ac.currentTime+0.012);gn.gain.exponentialRampToValueAtTime(0.0001,ac.currentTime+dur);
    o.connect(gn);gn.connect(master);if(toWet)gn.connect(delay);
    o.start();o.stop(ac.currentTime+dur+0.03);
  }
  return {
    resume(){ensure();if(ac.state==='suspended')ac.resume();},
    setMuted(m){ensure();muted=m;master.gain.setTargetAtTime(m?0:0.9,ac.currentTime,0.02);},
    isMuted(){return muted;},
    engineStart(){ensure();if(engine)return;const t=ac.currentTime;
      const o1=ac.createOscillator();o1.type='sawtooth';o1.frequency.value=80;
      const o2=ac.createOscillator();o2.type='square';o2.frequency.value=160;
      const sub=ac.createOscillator();sub.type='sine';sub.frequency.value=40;
      const mix=ac.createGain();mix.gain.value=0.5;o1.connect(mix);
      const g2=ac.createGain();g2.gain.value=0.28;o2.connect(g2);g2.connect(mix);
      const gs=ac.createGain();gs.gain.value=0.5;sub.connect(gs);gs.connect(mix);
      const ns=ac.createBufferSource();ns.buffer=noiseBuf;ns.loop=true;        // Verbrennungs-Rauschen
      const nbp=ac.createBiquadFilter();nbp.type='bandpass';nbp.frequency.value=950;nbp.Q.value=1.1;
      const ng=ac.createGain();ng.gain.value=0.05;ns.connect(nbp);nbp.connect(ng);ng.connect(mix);
      const lp=ac.createBiquadFilter();lp.type='lowpass';lp.frequency.value=850;lp.Q.value=1.2;mix.connect(lp);
      const body=ac.createBiquadFilter();body.type='bandpass';body.frequency.value=150;body.Q.value=5;  // Auspuff/Body
      const bodyG=ac.createGain();bodyG.gain.value=0.7;mix.connect(body);body.connect(bodyG);
      const throb=ac.createGain();throb.gain.value=0.5;lp.connect(throb);bodyG.connect(throb);            // Zündungs-Throb (AM)
      const lfo=ac.createOscillator();lfo.type='sawtooth';lfo.frequency.value=80;
      const lfoG=ac.createGain();lfoG.gain.value=0.5;lfo.connect(lfoG);lfoG.connect(throb.gain);
      const em=ac.createGain();em.gain.value=0.0001;throb.connect(em);em.connect(master);em.connect(delay);
      o1.start();o2.start();sub.start();ns.start();lfo.start();em.gain.setTargetAtTime(0.08,t,0.3);
      engine={o1,o2,sub,ns,lfo,lp,em};
    },
    engineStop(){if(!engine)return;const e=engine;engine=null;e.em.gain.setTargetAtTime(0.0001,ac.currentTime,0.12);
      setTimeout(()=>{try{e.o1.stop();e.o2.stop();e.sub.stop();e.ns.stop();e.lfo.stop();}catch(_){}},450);},
    update(speed,tun){if(!ac)return;
      if(engine){const t=ac.currentTime;const sp=Math.max(5,speed);const x=(sp-5)/1.2;const frac=x-Math.floor(x);
        const f=78+frac*94;                         // Gänge: Drehzahl steigt, fällt beim Hochschalten
        engine.o1.frequency.setTargetAtTime(f,t,0.05);engine.o2.frequency.setTargetAtTime(f*2,t,0.05);
        engine.sub.frequency.setTargetAtTime(f*0.5,t,0.05);engine.lfo.frequency.setTargetAtTime(f,t,0.04);
        engine.lp.frequency.setTargetAtTime(Math.max(320,560+sp*120-tun*340),t,0.1);}
      wet.gain.setTargetAtTime(tun*0.34,ac.currentTime,0.1);},
    lane(){noise(0.14,'highpass',1200,3200,0.16);},

let W,H,DPR,laneW,lanes,roadX,roadW,shoulderW;
const LANES=4, SS=2;
function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  W=Math.min(window.innerWidth,460); H=document.getElementById('wrap').clientHeight||window.innerHeight;
  cv.width=W*DPR; cv.height=H*DPR; cv.style.width=W+'px'; cv.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  roadW=Math.min(W*0.82,380); shoulderW=roadW*0.085; roadX=(W-roadW)/2;
  const driveW=roadW-shoulderW; laneW=driveW/LANES;
  lanes=[]; for(let i=0;i<LANES;i++) lanes.push(roadX+laneW*i+laneW/2);

}

/* ============ utils ============ */
function shade(hex,p){ // p>0 heller, <0 dunkler
  const n=parseInt(hex.slice(1),16); let r=n>>16,g=(n>>8)&255,b=n&255;
  const f=t=>Math.max(0,Math.min(255,Math.round(t+255*p)));
  return `rgb(${f(r)},${f(g)},${f(b)})`;
}
function rr(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.arcTo(x+w,y,x+w,y+h,r);c.arcTo(x+w,y+h,x,y+h,r);c.arcTo(x,y+h,x,y,r);c.arcTo(x,y,x+w,y,r);c.closePath();}

function noiseTile(w,h,base,amp,extra){
  const c=document.createElement('canvas');c.width=w;c.height=h;const x=c.getContext('2d');
  x.fillStyle=base;x.fillRect(0,0,w,h);
  const id=x.getImageData(0,0,w,h),d=id.data;
  for(let i=0;i<d.length;i+=4){const n=(Math.random()*2-1)*amp;d[i]+=n;d[i+1]+=n;d[i+2]+=n;}
  x.putImageData(id,0,0);
  if(extra)extra(x,w,h);
  return c;
}

let spriteCache={};
function buildVehicleSprite(kind,color,cab){
  const w=Math.round(carW()*SS), full=(kind==='truck'), h=Math.round(carH()*(full?2.35:1)*SS);
  const c=document.createElement('canvas');c.width=w;c.height=h;const g=c.getContext('2d');
  const m=w*0.06;                       // Rand
  if(full){ drawTruck(g,w,h,m,color,cab||'#b23b3b'); }
  else { drawCarBody(g,w,h,m,kind,color); }
  return c;
}
function drawCarBody(g,w,h,m,kind,color,roof,stripe){
  const bx=m,by=m,bw=w-2*m,bh=h-2*m,rad=bw*0.26;
  // Karosserie: horizontaler Verlauf (Wölbung)
  const lg=g.createLinearGradient(bx,0,bx+bw,0);
  lg.addColorStop(0,shade(color,-0.16));lg.addColorStop(.18,shade(color,.02));
  lg.addColorStop(.5,shade(color,.14));lg.addColorStop(.82,shade(color,.02));lg.addColorStop(1,shade(color,-0.16));
  rr(g,bx,by,bw,bh,rad);g.fillStyle=lg;g.fill();
  // Lack-Sheen vertikal
  const vg=g.createLinearGradient(0,by,0,by+bh);
  vg.addColorStop(0,'rgba(255,255,255,.18)');vg.addColorStop(.25,'rgba(255,255,255,0)');vg.addColorStop(.7,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,.18)');
  rr(g,bx,by,bw,bh,rad);g.fillStyle=vg;g.fill();
  // Rennstreifen
  if(stripe){g.save();rr(g,bx,by,bw,bh,rad);g.clip();g.fillStyle=stripe;g.fillRect(bx+bw*0.42,by,bw*0.07,bh);g.fillRect(bx+bw*0.51,by,bw*0.07,bh);g.restore();}
  // Proportionen je Typ
  let roofT=0.30,roofB=0.74; if(kind==='suv'){roofT=0.24;roofB=0.82;} if(kind==='van'){roofT=0.18;roofB=0.86;} if(kind==='sport'){roofT=0.36;roofB=0.68;} if(kind==='hatch'){roofT=0.30;roofB=0.80;}
  const gx0=bx+bw*0.17,gx1=bx+bw*0.83,gw=gx1-gx0;
  // Frontscheibe
  glass(g,gx0,by+bh*0.18,gw,bh*(roofT-0.18));
  // Dach
  rr(g,gx0,by+bh*roofT,gw,bh*(roofB-roofT),4);g.fillStyle=roof||shade(color,-0.05);g.fill();
  const rg=g.createLinearGradient(gx0,0,gx1,0);rg.addColorStop(0,'rgba(255,255,255,.12)');rg.addColorStop(.5,'rgba(255,255,255,0)');rg.addColorStop(1,'rgba(0,0,0,.1)');
  rr(g,gx0,by+bh*roofT,gw,bh*(roofB-roofT),4);g.fillStyle=rg;g.fill();
  // Heckscheibe
  glass(g,gx0,by+bh*roofB,gw,bh*0.13);
  // Seitenscheiben
  g.fillStyle='rgba(35,45,60,.55)';g.fillRect(gx0-2,by+bh*roofT,3,bh*(roofB-roofT));g.fillRect(gx1-1,by+bh*roofT,3,bh*(roofB-roofT));
  // Spiegel
  g.fillStyle=shade(color,-0.1);g.fillRect(bx-2,by+bh*0.30,4,bh*0.05);g.fillRect(bx+bw-2,by+bh*0.30,4,bh*0.05);
  // Scheinwerfer
  g.fillStyle='rgba(255,250,225,.95)';rr(g,bx+bw*0.08,by+2,bw*0.2,bh*0.05,2);g.fill();rr(g,bx+bw*0.72,by+2,bw*0.2,bh*0.05,2);g.fill();
  // Rücklichter
  g.fillStyle='rgba(210,40,30,.95)';rr(g,bx+bw*0.08,by+bh-bh*0.05-2,bw*0.22,bh*0.045,2);g.fill();rr(g,bx+bw*0.70,by+bh-bh*0.05-2,bw*0.22,bh*0.045,2);g.fill();
  // Specular-Streak
  g.save();g.globalCompositeOperation='lighter';g.strokeStyle='rgba(255,255,255,.22)';g.lineWidth=bw*0.06;g.beginPath();g.moveTo(bx+bw*0.32,by);g.lineTo(bx+bw*0.18,by+bh);g.stroke();g.restore();
  // Kante
  rr(g,bx,by,bw,bh,rad);g.strokeStyle='rgba(0,0,0,.25)';g.lineWidth=1;g.stroke();
}
function glass(g,x,y,w,h){
  const gg=g.createLinearGradient(0,y,0,y+h);
  gg.addColorStop(0,'rgba(120,150,180,.7)');gg.addColorStop(.5,'rgba(40,55,75,.85)');gg.addColorStop(1,'rgba(80,105,135,.7)');
  rr(g,x,y,w,h,3);g.fillStyle=gg;g.fill();
  g.save();g.globalCompositeOperation='lighter';g.fillStyle='rgba(255,255,255,.12)';rr(g,x+2,y+1,w*0.4,h-2,2);g.fill();g.restore();
}
function drawTruck(g,w,h,m,trailer,cab){
  const bx=m,bw=w-2*m;
  // Trailer
  const cabH=h*0.22, tY=h*0.20;
  const lg=g.createLinearGradient(bx,0,bx+bw,0);
  lg.addColorStop(0,shade(trailer,-0.14));lg.addColorStop(.5,shade(trailer,.12));lg.addColorStop(1,shade(trailer,-0.14));
  rr(g,bx,tY,bw,h-tY-m,5);g.fillStyle=lg;g.fill();
  g.strokeStyle='rgba(0,0,0,.18)';g.lineWidth=1;
  for(let i=1;i<6;i++){g.beginPath();g.moveTo(bx,tY+(h-tY)/6*i);g.lineTo(bx+bw,tY+(h-tY)/6*i);g.stroke();}
  // Cab
  const cg=g.createLinearGradient(bx,0,bx+bw,0);cg.addColorStop(0,shade(cab,-0.16));cg.addColorStop(.5,shade(cab,.14));cg.addColorStop(1,shade(cab,-0.16));
  rr(g,bx,m,bw,cabH,5);g.fillStyle=cg;g.fill();
  glass(g,bx+bw*0.12,m+2,bw*0.76,cabH*0.45);
  g.fillStyle='rgba(255,250,225,.95)';rr(g,bx+bw*0.06,m+1,bw*0.16,4,2);g.fill();rr(g,bx+bw*0.78,m+1,bw*0.16,4,2);g.fill();
}

/* ============ spawn ============ */
function spawn(ambient){
  const truck=Math.random()<0.26;
  // Spurwahl – Deutsches Rechtsfahrgebot (nicht garantiert, ~10% Abweichung)
  let lane;
  if(truck){
    lane=Math.random()<0.82?LANES-1:LANES-2;   // LKW: 82 % ganz rechts, 18 % zweite von rechts
  }else{
    const r=Math.random();
    if(r<0.38)     lane=LANES-1;   // 38 % ganz rechts (langsam)
    else if(r<0.68)lane=LANES-2;   // 30 % zweite von rechts
    else if(r<0.88)lane=1;         // 20 % zweite von links
    else            lane=0;        // 12 % Überholspur (links, schnell)
  }
  if(ambient&&lane===player.lane)lane=(lane+1)%LANES;
  const kind=truck?'truck':KINDS[Math.random()*KINDS.length|0];
  const col=COLS[Math.random()*COLS.length|0], cab=Math.random()<0.5?'#b23b3b':'#2c3e50';
  // Spurabhängige Geschwindigkeit (linke Spur = schneller, rechte = langsamer)
  // speedMul < 1 = langsamer als Spieler → Spieler überholt
  const laneSpd=[[0.74,0.22],[0.57,0.28],[0.44,0.24],[0.30,0.24]];
  const rw=(l)=>{
    const ls=laneSpd[Math.min(l,LANES-1)];
    const speedMul=truck
      ?0.30+Math.random()*0.20                    // LKW immer langsam (0.30–0.50)
      :Math.random()<0.10                          // 10 % Realvarianz (falsche Spur)
        ?0.42+Math.random()*0.54
        :ls[0]+Math.random()*ls[1];               // spurgerecht
    return {wobPhase:Math.random()*6.283,wobAmp:2+Math.random()*3,wobFreq:0.016+Math.random()*0.018,bobAmp:0.4+Math.random()*0.8,bobFreq:0.038+Math.random()*0.032,speedMul};
  };
  enemies.push({lane,x:lanes[lane],baseX:lanes[lane],y:-carH()*(truck?2.5:1.2),truck,kind,col,cab,key:truck?`t|${col}|${cab}`:`${kind}|${col}`,...rw(lane)});
  if(!ambient&&!truck&&Math.random()<0.4){let l2=(lane+2)%LANES;const k=KINDS[Math.random()*KINDS.length|0],c2=COLS[COLS.length*Math.random()|0];
    enemies.push({lane:l2,x:lanes[l2],baseX:lanes[l2],y:-carH()*(1.4+Math.random()*0.6),truck:false,kind:k,col:c2,key:`${k}|${c2}`,...rw(l2)});}
}

function boom(x,y,big){
  const n=big?22:14;
  for(let i=0;i<n;i++){const a=Math.random()*6.283,sp=2+Math.random()*(big?7:4.5);
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:24+Math.random()*18,max:42,
      col:['#fff3b0','#ffb02e','#ff6a2e','#ff3b2e'][Math.random()*4|0],r:2+Math.random()*4,fire:true});}
  for(let i=0;i<6;i++){const a=Math.random()*6.283,sp=1+Math.random()*2.5;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:30+Math.random()*20,max:50,col:'#555',r:4+Math.random()*5,fire:false});}

function trigger(type){
  if(type==='ramp'){
    if(player.air>0)return;
    const m=Math.round(500+Math.random()*1500);     // 500–2000 m
    const dur=Math.round((0.9+(m-500)/1500*1.1)*60); // längere Sprünge dauern länger
    player.air=0.001; player.jumpDur=dur; player.jumpBoost=(m/5)/dur;  // Strecke wird in Echtzeit geflogen
    addFloat('+'+m+' m','#7bdcff'); AU.jump();
  }else if(type==='rocket'){
    // alle Autos vor dem Spieler sprengen
    for(const e of enemies){ if(e.y<player.y) boom(e.x,e.y,e.truck); }
    enemies=enemies.filter(e=>e.y>=player.y);
    freeUntil=score+M2S(1000);                        // 1000 m freie Fahrt
    flash=1; addFloat('FREIE FAHRT','#ffd23f'); AU.rocket(); AU.free();
  }else if(type==='pothole'){
    if(player.air>0)return;
    player.ctrl=Math.round((1+Math.random())*60);     // 1–2 s Kontrollverlust
    addFloat('KONTROLLE!','#ff5b5b'); AU.pothole();
  }
}

function fillPat(pat,tileH,x,w){pat.setTransform(new DOMMatrix([1,0,0,1,0,scroll%tileH]));ctx.fillStyle=pat;ctx.fillRect(x,0,w,H);}
function blitVehicle(e){
  const w=carW(),h=carH()*(e.truck?2.35:1),x=e.x,y=e.y;
  // Schlagschatten (Licht von oben-links)
  ctx.save();ctx.globalAlpha=0.30;ctx.fillStyle='#000';rr(ctx,x-w/2+4,y-h/2+5,w,h,w*0.24);ctx.fill();ctx.restore();

  const rot=Math.cos(fc*(e.wobFreq||0.02)+(e.wobPhase||0))*(e.wobFreq||0.02)*(e.wobAmp||0)*0.10;
  const bob=Math.sin(fc*(e.bobFreq||0.04)+(e.wobPhase||0)*0.7)*(e.bobAmp||0);
  ctx.save();ctx.translate(x,y+bob);ctx.rotate(rot);ctx.drawImage(s,-w/2,-h/2,w,h);ctx.restore();
  // Rücklicht-Glow im Tunnel
  if(tunnelAmt>0.2){ctx.save();ctx.globalCompositeOperation='lighter';ctx.fillStyle=`rgba(255,40,30,${0.5*tunnelAmt})`;
    ctx.beginPath();ctx.ellipse(x,y+h*0.42,w*0.5,h*0.12,0,0,7);ctx.fill();ctx.restore();}
}

function drawPickup(p){

    ctx.fillStyle='#d8362c';ctx.beginPath();ctx.moveTo(0,-bh*0.62);ctx.lineTo(-bw/2,-bh*0.18);ctx.lineTo(bw/2,-bh*0.18);ctx.closePath();ctx.fill(); // Spitze
    ctx.fillStyle='#d8362c';ctx.beginPath();ctx.moveTo(-bw/2,bh*0.32);ctx.lineTo(-bw*0.9,bh*0.5);ctx.lineTo(-bw/2,bh*0.5);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(bw/2,bh*0.32);ctx.lineTo(bw*0.9,bh*0.5);ctx.lineTo(bw/2,bh*0.5);ctx.closePath();ctx.fill();

    const g=ctx.createRadialGradient(0,-2,2,0,0,w*0.5);g.addColorStop(0,'#000');g.addColorStop(.7,'#15161a');g.addColorStop(1,'#26282d');

function drawParticles(){

  ctx.globalAlpha=1;ctx.save();ctx.globalCompositeOperation='lighter';
  for(const q of particles){if(!q.fire)continue;ctx.globalAlpha=Math.max(0,q.life/q.max);ctx.fillStyle=q.col;ctx.beginPath();ctx.arc(q.x,q.y,q.r,0,7);ctx.fill();}
  ctx.restore();ctx.globalAlpha=1;
}
function drawFloats(){

  ctx.save();rr(ctx,bx,by,bw,22,11);ctx.fillStyle='rgba(0,0,0,.5)';ctx.fill();
  rr(ctx,bx+2,by+2,(bw-4)*Math.max(0,Math.min(1,frac)),18,9);ctx.fillStyle='#ffd23f';ctx.fill();
  ctx.fillStyle='#1a1200';ctx.font='800 11px Inter,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('FREIE FAHRT · '+m+' m',W/2,by+11);ctx.textAlign='left';ctx.textBaseline='alphabetic';ctx.restore();
}
function drawWorld(){
  const t=tunnelAmt;
  // Seiten: Gras oder Tunnelbeton
  if(t<0.98){ctx.globalAlpha=1-t;fillPat(grassPat,160,0,W);ctx.globalAlpha=1;}
  if(t>0.02){ctx.globalAlpha=t;fillPat(concretePat,300,0,W);ctx.globalAlpha=1;}
  // Fahrbahn
  fillPat(asphaltPat,440,roadX,roadW);
  if(t>0.02){ctx.fillStyle=`rgba(8,9,12,${0.55*t})`;ctx.fillRect(roadX,0,roadW,H);}   // Tunnel abdunkeln
  // Standstreifen
  ctx.fillStyle='rgba(0,0,0,.12)';ctx.fillRect(roadX+roadW-shoulderW,0,shoulderW,H);
  // Randlinien
  ctx.fillStyle='rgba(236,236,236,.92)';ctx.fillRect(roadX+2,0,3,H);ctx.fillRect(roadX+roadW-shoulderW-3,0,3,H);ctx.fillRect(roadX+roadW-6,0,3,H);
  // Spurstriche (mit leichtem Schatten -> Tiefe)
  ctx.lineCap='round';
  for(let i=1;i<LANES;i++){const x=roadX+laneW*i;
    ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=5;ctx.setLineDash([28,34]);ctx.lineDashOffset=-scroll+1;ctx.beginPath();ctx.moveTo(x+1,0);ctx.lineTo(x+1,H);ctx.stroke();
    ctx.strokeStyle='rgba(238,238,236,.9)';ctx.lineWidth=4;ctx.lineDashOffset=-scroll;ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  ctx.setLineDash([]);
  // Leitplanken
  drawGuardrail('L');drawGuardrail('R');
  // Tunnelwände + Deckenlichter
  if(t>0.02){
    ctx.fillStyle=`rgba(12,13,17,${0.9*t})`;ctx.fillRect(roadX-8,0,10,H);ctx.fillRect(roadX+roadW-2,0,10,H);
    ctx.save();ctx.globalCompositeOperation='lighter';
    for(let yy=(-scroll*1.4%150);yy<H;yy+=150){const g=ctx.createRadialGradient(roadX+roadW/2,yy,2,roadX+roadW/2,yy,60);
      g.addColorStop(0,`rgba(255,240,190,${0.85*t})`);g.addColorStop(1,'rgba(255,240,190,0)');ctx.fillStyle=g;ctx.beginPath();ctx.ellipse(roadX+roadW/2,yy,40,9,0,0,7);ctx.fill();}
    ctx.restore();
    const vg=ctx.createLinearGradient(0,0,0,H);vg.addColorStop(0,`rgba(0,0,0,${0.6*t})`);vg.addColorStop(.5,'rgba(0,0,0,0)');ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
  }
}
function postFX(){
  // Speed-Lines
  if(speed>8){ctx.save();ctx.globalCompositeOperation='lighter';ctx.strokeStyle=`rgba(255,255,255,${Math.min(0.12,(speed-8)*0.02)})`;ctx.lineWidth=1;
    for(let i=0;i<6;i++){const x=roadX+Math.random()*roadW;const y=Math.random()*H;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x,y+30+speed*3);ctx.stroke();}ctx.restore();}
  // Distanz-Dunst oben
  const hz=ctx.createLinearGradient(0,0,0,H*0.18);hz.addColorStop(0,'rgba(120,130,140,.12)');hz.addColorStop(1,'rgba(120,130,140,0)');ctx.fillStyle=hz;ctx.fillRect(0,0,W,H*0.18);
  // Vignette
  ctx.fillStyle=vignette;ctx.fillRect(0,0,W,H);
  // Raketen-Blitz
  if(flash>0.02){ctx.fillStyle=`rgba(255,250,235,${flash*0.45})`;ctx.fillRect(0,0,W,H);}
  // Film-Grain
  ctx.save();ctx.globalAlpha=0.5;grainPat.setTransform(new DOMMatrix([1,0,0,1,(Math.random()*128)|0,(Math.random()*128)|0]));ctx.fillStyle=grainPat;ctx.fillRect(0,0,W,H);ctx.restore();
}

/* ============ loop ============ */
function frame(){
  requestAnimationFrame(frame);
  if(paused){
    ctx.clearRect(0,0,W,H);drawWorld();
    for(const s of signs)drawSign(s);for(const p of pickups)drawPickup(p);
    for(const e of enemies)blitVehicle(e);drawPlayerCar();drawParticles();drawFloats();drawFreeBar();postFX();
    return;
  }
  const cfg=DIFF[diff];
  speed=(state==='play')?cfg.base+score*cfg.ramp:4.2;
  scroll+=speed; fc++;
  if(state==='play'){
    const seg=ROUTE[segIndex];
    if(score-segStart>=seg.len){segStart=score;segIndex=(segIndex+1)%ROUTE.length;signs.push({y:-30,name:ROUTE[segIndex].name});document.getElementById('placeName').textContent=ROUTE[segIndex].name;}
    tunnelAmt+=((ROUTE[segIndex].type==='tunnel'?1:0)-tunnelAmt)*0.04;
    if(player.hit>0)player.hit--;
    // Sprung (Rampe): Auto fliegt hoch, Welt rauscht in Echtzeit schneller drunter durch
    const bkTarget=(braking&&player.air<=0)?Math.max(0.04,1-brakeDepth*0.96):1;
    if(brakeFactor>bkTarget)brakeFactor=Math.max(bkTarget,brakeFactor-Math.max(0.001,brakeDepth*0.003));
    else brakeFactor=Math.min(1,brakeFactor+0.005);
    let eff=speed*brakeFactor;
    if(player.air>0){ eff=speed+player.jumpBoost/0.18; player.air+=1/player.jumpDur;
      if(player.air>=1){player.air=0;dust(player.x,player.y+carH()*0.4);AU.land();} }
    scroll+=eff-speed;
    // Kontrollverlust (Schlagloch)
    if(player.ctrl>0){ player.ctrl--;
      if(player.ctrl%8===0) player.targetX=roadX+laneW*0.6+Math.random()*((roadW-shoulderW)-laneW*1.2);
      player.wob=Math.sin(fc*0.6)*0.18;
      if(player.ctrl===0){player.lane=Math.max(0,Math.min(LANES-1,Math.round((player.x-roadX-laneW/2)/laneW)));player.targetX=lanes[player.lane];player.wob=0;}
    } else { player.wob*=0.8; }
    player.x+=(player.targetX-player.x)*0.25;
    // Verkehr (nicht während freier Fahrt)
    const gap=Math.max(30,cfg.gap-score*0.012);
    if(brakeFactor<0.35) enemies=enemies.filter(e=>e.y>-H);
    if(score>=freeUntil && (spawnTimer+=brakeFactor)>=gap && enemies.length<10){spawnTimer=0;spawn(false);}
    if(--pickupTimer<=0){pickupTimer=180+(Math.random()*160|0);spawnPickup();}
    const h=carH(), invuln=player.air>0||score<freeUntil;
    for(const e of enemies){e.y+=eff*(e.speedMul||1);if(e.baseX!==undefined)e.x=e.baseX+Math.sin(fc*(e.wobFreq||0.02)+(e.wobPhase||0))*(e.wobAmp||0);const eh=h*(e.truck?2.35:1);
      if(diff!=='ghost'&&!invuln&&Math.abs(e.x-player.x)<carW()*0.6&&Math.abs(e.y-player.y)<(eh+h)/2*0.82){crash();return;}}
    enemies=enemies.filter(e=>e.y<H+h*3);
    for(let i=0;i<enemies.length;i++){for(let j=i+1;j<enemies.length;j++){if(enemies[i].lane!==enemies[j].lane)continue;const hi=h*(enemies[i].truck?2.35:1),hj=h*(enemies[j].truck?2.35:1);const minD=(hi+hj)*0.5+12;const dy=enemies[j].y-enemies[i].y;if(Math.abs(dy)<minD){if(dy>=0)enemies[j].y=enemies[i].y+minD;else enemies[i].y=enemies[j].y+minD;}}}
    for(const p of pickups){p.y+=eff;
      if(!p.done&&player.air<=0&&Math.abs(p.x-player.x)<carW()*0.62&&Math.abs(p.y-player.y)<h*0.7){p.done=true;trigger(p.type);}}
    pickups=pickups.filter(p=>p.y<H+h*2&&!p.done);
    for(const q of particles){q.x+=q.vx;q.y+=q.vy+eff*0.25;q.vx*=0.94;q.vy*=0.94;q.life--;}
    particles=particles.filter(q=>q.life>0);
    for(const f of floats){f.y-=0.8;f.life--;} floats=floats.filter(f=>f.life>0);
    for(const s of signs)s.y+=eff;signs=signs.filter(s=>s.y<H+40);
    if(flash>0.02)flash*=0.88;else flash=0;
    AU.update(eff,tunnelAmt);
    score+=eff*0.18;
    document.getElementById('score').textContent=kmTxt(score);document.getElementById('best').textContent=kmTxt(best);
    document.getElementById('speedo').textContent=Math.round(eff*18);
  }else{
    tunnelAmt+=(-tunnelAmt)*0.04;if(++spawnTimer>=70){spawnTimer=0;spawn(true);}
    for(const e of enemies){e.y+=speed*(e.speedMul||1);if(e.baseX!==undefined)e.x=e.baseX+Math.sin(fc*(e.wobFreq||0.02)+(e.wobPhase||0))*(e.wobAmp||0);}enemies=enemies.filter(e=>e.y<H+carH()*3);
    const ch=carH();for(let i=0;i<enemies.length;i++){for(let j=i+1;j<enemies.length;j++){if(enemies[i].lane!==enemies[j].lane)continue;const hi=ch*(enemies[i].truck?2.35:1),hj=ch*(enemies[j].truck?2.35:1);const minD=(hi+hj)*0.5+12;const dy=enemies[j].y-enemies[i].y;if(Math.abs(dy)<minD){if(dy>=0)enemies[j].y=enemies[i].y+minD;else enemies[i].y=enemies[j].y+minD;}}}
  }
  ctx.clearRect(0,0,W,H);
  drawWorld();
  for(const s of signs)drawSign(s);
  for(const p of pickups)drawPickup(p);
  for(const e of enemies)blitVehicle(e);
  drawPlayerCar();
  drawParticles();
  drawFloats();
  drawFreeBar();
  postFX();
}
function crash(){paused=false;state='over';best=Math.max(best,score);AU.engineStop();AU.crash();
  document.getElementById('pauseBtn').classList.remove('on');document.getElementById('ghostHud').classList.remove('on');document.getElementById('pause').classList.add('hidden');
  const earned=Math.floor(score/2);coins+=earned;Store.save();
  document.getElementById('finalScore').textContent=kmTxt(score);document.getElementById('finalBest').textContent=kmTxt(best);
  document.getElementById('earned').textContent='+'+earned.toLocaleString('de-DE')+' Coins';
  const km=score/200;let v='Auf dem Standstreifen gelandet.';
  if(km>9)v='Othmarschen. Elbtunnel voraus!';
  if(km>13)v='Elbtunnel geschafft. Klasse Fahrt!';
  if(km>18)v='Hamburg-Heimfeld! Die Stadt liegt hinter dir.';
  if(km>75)v='Soltau! Lüneburger Heide im Rückspiegel.';
  if(km>133)v='Hannover – die Hälfte liegt vor dir!';
  if(km>263)v='Göttingen passiert. Hessen liegt vor dir.';
  if(km>399)v='Fulda! Der Süden ruft.';
  if(km>490)v='Würzburg – Bayern hat dich!';
  if(km>667)v='Kreuz Ulm! Schwaben grüßt dich.';
  if(km>754)v='Kempten! Das Allgäu öffnet sich.';
  if(km>799)v='Füssen – fast da! Vollgas zum Grenztunnel!';
  if(km>803)v='Grenztunnel Füssen erreicht – absolut legendär!';
  document.getElementById('verdict').textContent=v;
  document.getElementById('hud').classList.remove('on');document.getElementById('place').classList.remove('on');document.getElementById('speedoBox').classList.remove('on');document.getElementById('brakeBtn').classList.remove('on');braking=false;brakeDepth=0;brakeFactor=1;document.getElementById('over').classList.remove('hidden');}
function startGame(){AU.resume();AU.click();resetRun();state='play';paused=false;AU.engineStart();document.getElementById('menu').classList.add('hidden');document.getElementById('over').classList.add('hidden');document.getElementById('pause').classList.add('hidden');document.getElementById('hud').classList.add('on');document.getElementById('place').classList.add('on');document.getElementById('speedoBox').classList.add('on');document.getElementById('pauseBtn').classList.add('on');document.getElementById('ghostHud').classList.toggle('on',diff==='ghost');document.getElementById('brakeBtn').classList.add('on');}
function toMenu(){paused=false;AU.engineStop();AU.click();state='menu';enemies=[];signs=[];pickups=[];particles=[];floats=[];tunnelAmt=0;player=newPlayer();player.x=player.targetX=lanes[1];player.y=H-carH()*1.7;refreshMenuStats();document.getElementById('speedoBox').classList.remove('on');document.getElementById('over').classList.add('hidden');document.getElementById('pause').classList.add('hidden');document.getElementById('pauseBtn').classList.remove('on');document.getElementById('ghostHud').classList.remove('on');document.getElementById('brakeBtn').classList.remove('on');braking=false;brakeDepth=0;brakeFactor=1;document.getElementById('menu').classList.remove('hidden');}
function openShop(){AU.resume();AU.click();renderShop();document.getElementById('menu').classList.add('hidden');document.getElementById('over').classList.add('hidden');document.getElementById('shop').classList.remove('hidden');}
function closeShop(){AU.click();document.getElementById('shop').classList.add('hidden');refreshMenuStats();document.getElementById('menu').classList.remove('hidden');}
function renderShop(){
  document.getElementById('shopCoins').textContent=Math.round(coins).toLocaleString('de-DE');
  const grid=document.getElementById('shopGrid');grid.innerHTML='';
  for(const c of CARS){
    const card=document.createElement('div');card.className='card'+(sel===c.id?' active':'');
    const prev=buildSkinSprite(c,72,124);prev.className='prev';
    card.appendChild(prev);
    const nm=document.createElement('div');nm.className='cn';nm.textContent=c.name;card.appendChild(nm);
    const btn=document.createElement('button');btn.className='cbtn';
    if(sel===c.id){btn.textContent='Aktiv';btn.classList.add('on');btn.disabled=true;}
    else if(owned[c.id]){btn.textContent='Auswählen';btn.onclick=()=>{sel=c.id;delete spriteCache['P|'+sel];Store.save();AU.click();renderShop();};}
    else{btn.textContent=c.price.toLocaleString('de-DE')+' Coins';btn.classList.add('buy');
      btn.onclick=()=>{ if(coins>=c.price){coins-=c.price;owned[c.id]=true;sel=c.id;Store.save();AU.free();renderShop();}
        else{AU.pothole();card.classList.add('shake');setTimeout(()=>card.classList.remove('shake'),300);} };}
    card.appendChild(btn);grid.appendChild(card);
  }
}

function setDiff(d){
  diff=d;
  [...document.querySelectorAll('#seg button')].forEach(x=>x.classList.toggle('sel',x.dataset.d===d));
  [...document.querySelectorAll('#pseg button')].forEach(x=>x.classList.toggle('sel',x.dataset.d===d));
  const gt=document.getElementById('ghostTag');if(gt)gt.classList.toggle('on',d==='ghost');
  const gh=document.getElementById('ghostHud');if(gh)gh.classList.toggle('on',d==='ghost'&&state==='play');
}
function syncPauseMute(){const b=document.getElementById('pmuteBtn');if(b)b.textContent=AU.isMuted()?'Ton ein':'Ton aus';}
function pauseGame(){
  if(state!=='play')return;
  paused=true;AU.engineStop();
  setDiff(diff);syncPauseMute();
  document.getElementById('pause').classList.remove('hidden');
  document.getElementById('pauseBtn').classList.remove('on');
}
function resumeGame(){
  paused=false;
  if(state==='play')AU.engineStart();
  document.getElementById('pause').classList.add('hidden');
  document.getElementById('pauseBtn').classList.add('on');
}
document.getElementById('seg').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;AU.resume();AU.click();setDiff(b.dataset.d);});
document.getElementById('pseg').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;AU.click();setDiff(b.dataset.d);});
document.getElementById('pauseBtn').addEventListener('click',pauseGame);
document.getElementById('resumeBtn').addEventListener('click',resumeGame);
document.getElementById('ptoMenu').addEventListener('click',()=>{resumeGame();toMenu();});
document.getElementById('pmuteBtn').addEventListener('click',()=>{AU.resume();AU.setMuted(!AU.isMuted());renderMute();syncPauseMute();});
document.getElementById('play').onclick=startGame;
document.getElementById('retry').onclick=startGame;
document.getElementById('toMenu').onclick=toMenu;
const muteBtn=document.getElementById('mute');
const SVG_ON='<svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M4 9v6h4l5 4V5L8 9H4z" fill="#fff"/><path d="M16 8.5a4 4 0 010 7" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>';
const SVG_OFF='<svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M4 9v6h4l5 4V5L8 9H4z" fill="#9aa0a8"/><path d="M16 9l5 6M21 9l-5 6" stroke="#ff6a6a" stroke-width="2" stroke-linecap="round"/></svg>';
function renderMute(){muteBtn.innerHTML=AU.isMuted()?SVG_OFF:SVG_ON;}
muteBtn.onclick=()=>{AU.resume();AU.setMuted(!AU.isMuted());renderMute();};
renderMute();
document.getElementById('shopBtn').onclick=openShop;
document.getElementById('shopBack').onclick=closeShop;
Store.load();
requestAnimationFrame(frame);
</script>
